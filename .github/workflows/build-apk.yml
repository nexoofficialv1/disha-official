name: Build DISHA APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Current location:"
          pwd
          echo "Root files:"
          ls -la
          echo "Find Flutter project:"
          find . -name pubspec.yaml -not -path "*/.dart_tool/*" -print

      - name: Find Flutter app directory
        shell: bash
        run: |
          PUBSPEC_PATH=$(find . -name pubspec.yaml -not -path "*/.dart_tool/*" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "ERROR: pubspec.yaml not found. Upload mobile folder to repo root."
            exit 1
          fi
          APP_DIR=$(dirname "$PUBSPEC_PATH")
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
          echo "Flutter app directory: $APP_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Ensure Android platform exists
        shell: bash
        run: |
          cd "$APP_DIR"
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi

      - name: Install Flutter dependencies
        shell: bash
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Analyze Flutter code
        shell: bash
        run: |
          cd "$APP_DIR"
          flutter analyze

      - name: Build debug APK
        shell: bash
        run: |
          cd "$APP_DIR"
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DISHA-v1-debug-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
